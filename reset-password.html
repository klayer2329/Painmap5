<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset administrator password · HoopFoot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/admin.css?v=password-reset-1">
</head>
<body class="admin-body">
  <header class="admin-header">
    <div><p class="eyebrow">HoopFoot · Restricted access</p><h1>Reset administrator password</h1></div>
    <a class="btn btn-secondary" href="admin.html">Back to sign in</a>
  </header>
  <main class="admin-main">
    <section class="admin-panel admin-login">
      <p id="resetStatus" class="admin-message" role="status">Checking the recovery link…</p>
      <form id="resetForm" hidden>
        <label>New password<input type="password" id="newPassword" autocomplete="new-password" minlength="8" required></label>
        <label>Confirm new password<input type="password" id="confirmPassword" autocomplete="new-password" minlength="8" required></label>
        <button class="btn btn-primary" type="submit">Save new password</button>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
