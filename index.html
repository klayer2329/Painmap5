<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Basketball Foot &amp; Ankle Injury Screening System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="scoreboard">
  <div class="sb-inner">
    <div class="sb-logo">🏀 <span>Foot &amp; Ankle Screen</span></div>
    <div id="quarterTrack" class="quarter-track">
      <div class="q" data-q="0"><span class="q-label">Q1</span><span class="q-name">Safety</span></div>
      <div class="q" data-q="1"><span class="q-label">Q2</span><span class="q-name">Questions</span></div>
      <div class="q" data-q="2"><span class="q-label">Q3</span><span class="q-name">Location</span></div>
      <div class="q" data-q="3"><span class="q-label">Q4</span><span class="q-name">Function</span></div>
      <div class="q" data-q="4"><span class="q-label">FT</span><span class="q-name">Results</span></div>
    </div>
  </div>
</div>

<main id="app"></main>

<footer id="appFooter">
  <p>For preliminary screening only. This is not a diagnosis and does not replace medical examination or imaging. Seek urgent care for severe symptoms.</p>
</footer>

<script src="js/data/questions.js"></script>
<script src="js/data/acuteConditions.js"></script>
<script src="js/data/chronicConditions.js"></script>
<script src="js/data/specialTests.js"></script>
<script src="js/data/rehab.js"></script>
<script src="js/engine/scoring.js"></script>
<script src="js/painmap.js"></script>
<script src="js/en.js"></script>
<script src="js/app.js"></script>
</body>
</html>
